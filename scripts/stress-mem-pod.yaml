apiVersion: v1
kind: Pod
metadata:
  name: stress-mem-test
  namespace: la-huella-8
spec:
  containers:
    - name: stress-mem-test
      image: polinux/stress
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "220Mi","--vm-hang","1", "--timeout", "420s"]
  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"
    requests:
      memory: "128Mi"
      cpu: "100m"
  restartPolicy: Never
