apiVersion: v1
kind: Pod
metadata:
  name: stress-mem-test
  namespace: la-huella-8
spec:
  containers:
    - name: stress-mem-test
      image: polinux/stress
      resources:
        requests:
          cpu: "100m"
          memory: "200Mi"
        limits:
          cpu: "200m"
          memory: "300Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "260M", "--vm-hang", "1", "--timeout", "420s"]
  restartPolicy: Never